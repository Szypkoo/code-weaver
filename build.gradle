plugins {
    id 'com.diffplug.spotless' version '8.4.0'
    id 'java-gradle-plugin'
    id 'maven-publish'
}

group = 'me.szypko.codeweaver'
version = '0.1'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation gradleTestKit()
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    dependsOn pluginDescriptors
}

gradlePlugin {
    plugins {
        codeWeaver {
            id = 'me.szypko.codeweaver'
            implementationClass = 'me.szypko.codeweaver.CodeWeaverPlugin'
        }
    }
}

spotless {
    java {
        googleJavaFormat().reflowLongStrings().skipJavadocFormatting()
    }
}